services:
  kik-app:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: .
      dockerfile: .config/Dockerfile.dev
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOME=/app
      - UPLOAD_DIR=/app/uploads
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "51212:51212"
    volumes:
      - .:/app:rw
      - ./uploads:/app/uploads:rw
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    volumes:
      - ./db/:/var/lib/postgresql/data:rw
